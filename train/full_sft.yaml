### model
model_name_or_path: /path/to/checkpoint
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
deepspeed: /path/to/ds_z3_config.json

### dataset
dataset_dir: /path/to/training_data
dataset: sft_en-zh_tool,sft_en-zh_trans_base_sample,sft_en-de_tool,sft_en-de_trans_base_sample,sft_en-fr_tool,sft_en-fr_trans_base_sample
template: qwen3_nothink
cutoff_len: 2560
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4
mask_history: true

### output
output_dir: ./sft
logging_steps: 5
save_strategy: epoch
plot_loss: true
overwrite_output_dir: true
save_only_model: true
report_to: tensorboard

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null
